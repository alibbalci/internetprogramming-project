<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">

<h:head>
    <title>ISG Yonetim Sistemi - Giris</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background-color: #eef3f8;
            color: #24384a;
        }

        .login-box {
            width: 100%;
            max-width: 390px;
            background-color: #ffffff;
            border: 1px solid #d8e0e8;
            border-radius: 10px;
            padding: 30px;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 8px;
            color: #2c3e50;
            font-size: 26px;
        }

        .subtitle {
            margin: 0 0 24px;
            color: #64788c;
            font-size: 14px;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-weight: bold;
            color: #2c3e50;
        }

        input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #cfd9e3;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .login-button {
            width: 100%;
            margin-top: 8px;
            padding: 12px 16px;
            border: 0;
            border-radius: 8px;
            background-color: #2c3e50;
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
        }

        .messages {
            margin-bottom: 16px;
            color: #b3261e;
            font-size: 14px;
        }
    </style>
</h:head>

<h:body>
    <div class="login-box">
        <h1>ISG Yonetim Sistemi</h1>
        <p class="subtitle">Panele devam etmek icin giris yapin.</p>

        <h:messages styleClass="messages" globalOnly="true"/>

        <h:form>
            <div class="field">
                <h:outputLabel for="email" value="E-posta"/>
                <h:inputText id="email" value="#{loginBean.user.email}" required="true"/>
            </div>

            <div class="field">
                <h:outputLabel for="password" value="Parola"/>
                <h:inputSecret id="password" value="#{loginBean.user.password}" required="true"/>
            </div>

            <h:commandButton value="Giris Yap" action="#{loginBean.login}" styleClass="login-button"/>
        </h:form>
    </div>
</h:body>
</html>
