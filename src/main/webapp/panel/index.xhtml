<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">

<h:head>
    <title>İSG Yönetim Paneli</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef3f8;
            margin: 0;
            padding: 0;
        }

        .topbar {
            background-color: #2c3e50;
            color: white;
            padding: 18px;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 30px;
        }

        .card {
            background-color: white;
            padding: 25px;
            border-radius: 6px;
            border: 1px solid #d6dce2;
            max-width: 700px;
        }

        .menu {
            margin-top: 20px;
        }

        .menu a {
            display: inline-block;
            background-color: #ff8c00;
            color: white;
            padding: 12px 18px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            margin-right: 10px;
        }
    </style>
</h:head>

<h:body>

    <div class="topbar">
        İSG Yönetim Sistemi
    </div>

    <div class="container">
        <div class="card">
            <h1>Yönetim Paneli</h1>
            <p>Bu panel üzerinden İSG firma takip sisteminin modüllerine erişebilirsiniz.</p>

            <div class="menu">
                <a href="#{request.contextPath}/app/company/company-list.xhtml">
                    Firma Yönetimi
                </a>
                <a href="#{request.contextPath}/app/institution/institution-list.xhtml">
                    Kurumsal Yönetim
                </a>
                <a href="#{request.contextPath}/app/employee/employee-list.xhtml">
                    Çalışan Yönetimi
                </a>
            </div>
        </div>
    </div>

</h:body>
</html>
